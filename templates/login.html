<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login — LogSentinel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="auth-logo-name">LOGSENTINEL</div>
      <div class="auth-logo-sub">MINI SIEM · SOC ANALYZER</div>
    </div>
    <div class="auth-card">
      <h2>Acesso ao Sistema</h2>
      <form method="POST">
        <label class="auth-label">Usuário</label>
        <input class="auth-input" name="user" placeholder="seu_usuario" autocomplete="username">
        <label class="auth-label">Senha</label>
        <input class="auth-input" name="password" type="password" placeholder="••••••••" autocomplete="current-password">
        <button class="auth-btn auth-btn-login" type="submit">Entrar →</button>
      </form>
      {% if msg %}<div class="auth-msg-error">{{ msg }}</div>{% endif %}
      <div class="auth-links">
        <a href="/register">Criar conta</a>
        <span class="auth-sep">·</span>
        <a href="/change-password">Alterar senha</a>
      </div>
    </div>
  </div>
</body>
</html>

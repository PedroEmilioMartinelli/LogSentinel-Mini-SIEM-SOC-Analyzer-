<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Trocar Senha — LogSentinel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
  <div class="card">
    <h2>Trocar Senha</h2>
    <form method="POST">
      <input name="user" type="text" placeholder="Usuário">
      <input name="current_password" type="password" placeholder="Senha atual">
      <input name="new_password" type="password" placeholder="Nova senha (mín. 6 caracteres)">
      <input name="confirm_password" type="password" placeholder="Confirmar nova senha">
      <button type="submit">Alterar Senha</button>
    </form>

    {% if errors %}
      {% for e in errors %}
        <p class="error">⚠ {{ e }}</p>
      {% endfor %}
    {% endif %}

    {% if success %}
      <p style="color:#4ade80; margin-top:10px; font-size:13px;">✅ {{ success }}</p>
    {% endif %}

    <a href="/">← Voltar ao login</a>
  </div>
</body>
</html>
